name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Deliberately NOT using actions/setup-python: its CPython builds don't
      # reliably include tkinter. Using the runner's system Python3 + apt's
      # python3-tk keeps tkinter available inside the venv (it's part of the
      # stdlib, which venvs inherit from the base interpreter).
      - name: Install system dependencies (needs Python 3.12+, tkinter, Xvfb)
        run: |
          python3 --version
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-venv xvfb

      - name: Install project
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"

      - name: Ruff check
        run: |
          source .venv/bin/activate
          ruff check .

      - name: Ruff format check
        run: |
          source .venv/bin/activate
          ruff format --check .

      - name: Mypy
        run: |
          source .venv/bin/activate
          mypy .

      - name: Pytest
        run: |
          source .venv/bin/activate
          xvfb-run -a pytest
