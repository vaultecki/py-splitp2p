[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = ["venv"]

[tool.ruff.lint]
select = ["E", "F", "W"]

[tool.mypy]
python_version = "3.12"
exclude = ["venv"]

[[tool.mypy.overrides]]
module = [
    "libp2p.*",
    "multiaddr.*",
    "qrcode.*",
    "cv2.*",
    "fpdf.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
